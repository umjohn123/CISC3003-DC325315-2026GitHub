<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CISC3003 Practice 08</title>
    <link href='http://fonts.googleapis.com/css?family=Merriweather' rel='stylesheet' type='text/css'>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>    
<body class="tiled">
<header>
    <h1>Art Filters</h1>
</header>
<main>
    <div id="sliderBox">
        <form>
           <label>Opacity: </label><p><input type="range" id="sliderOpacity" min="0" max="100" value="100" class="sliders" /> <span id="numOpacity">100</span>%</p>
           <p><label>Saturation: </label><input type="range" id="sliderSaturation" min="1" max="300" value="100" class="sliders"/> <span id="numSaturation">100</span>%</p>
           <p><label>Brightness: </label><input type="range" id="sliderBrightness" min="0" max="300" value="100" class="sliders" /> <span id="numBrightness">100</span>%</p>
           <p><label>Hue Rotate: </label><input type="range" id="sliderHue" min="0" max="360" value="0" class="sliders" /> <span id="numHue">0</span>deg</p>
           <p><label>Grayscale: </label><input type="range" id="sliderGray" min="0" max="100" value="0" class="sliders"/> <span id="numGray">0</span>%</p>
           <p><label>Blur: </label><input type="range" id="sliderBlur" min="0" max="10" value="0" class="sliders" /> <span id="numBlur">0</span>px</p>
           <p><button id="resetFilters" type="button">Reset</button> </p>
        </form>    
    </div>
    <figure id="imgManipulated">
        <img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/medium/painting1.jpg" > 
        <figcaption>
            <em>Still Life with Flowers in a Glass Vase</em> <br>
            Jan Davidsz. de Heem, 1650 - 1683
        </figcaption>
    </figure>   
    <div id="thumbBox">
        <div><img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/small/painting1.jpg"  alt="Still Life with Flowers in a Glass Vase" title="Jan Davidsz. de Heem, 1650 - 1683"/></div>
        <div><img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/small/painting2.jpg"  alt="Portrait of Alida Christina Assink" title="Jan Adam Kruseman, 1833"/></div>
        <div><img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/small/painting3.jpg"  alt="Self-portrait" title="Vincent van Gogh, 1887"/></div>
        <div><img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/small/painting4.jpg"  alt="William II, Prince of Orange, and his Bride, Mary Stuart" title="Anthony van Dyck, 1641"/></div>
        <div><img src="D:/cisc3003/CISC3003-dc325315-2026/CISC3003-Practice08-2026MAR20/public/images/small/painting5.jpg"  alt="Milkmaid" title="Johannes Vermeer, c. 1660"/></div>
    </div>
</main>

<script>
$(document).ready(function() {

    $('#thumbBox img').on('click', function() {
        let smallSrc = $(this).attr('src');
        let mediumSrc = smallSrc.replace('small', 'medium');
        let altText = $(this).attr('alt');
        let titleText = $(this).attr('title');
        
        $('#imgManipulated img').attr('src', mediumSrc);
        $('#imgManipulated figcaption').html('<em>' + altText + '</em><br>' + titleText);
    });
    

    function applyFilters() {
        let filterString = "opacity(" + $('#sliderOpacity').val() + "%) " +
                           "saturate(" + $('#sliderSaturation').val() + "%) " +
                           "brightness(" + $('#sliderBrightness').val() + "%) " +
                           "hue-rotate(" + $('#sliderHue').val() + "deg) " +
                           "grayscale(" + $('#sliderGray').val() + "%) " +
                           "blur(" + $('#sliderBlur').val() + "px)";
        $('#imgManipulated img').css({
            'filter': filterString,
            '-webkit-filter': filterString
        });
    }
    

    $('#sliderOpacity').on('input', function() { $('#numOpacity').text($(this).val()); applyFilters(); });
    $('#sliderSaturation').on('input', function() { $('#numSaturation').text($(this).val()); applyFilters(); });
    $('#sliderBrightness').on('input', function() { $('#numBrightness').text($(this).val()); applyFilters(); });
    $('#sliderHue').on('input', function() { $('#numHue').text($(this).val()); applyFilters(); });
    $('#sliderGray').on('input', function() { $('#numGray').text($(this).val()); applyFilters(); });
    $('#sliderBlur').on('input', function() { $('#numBlur').text($(this).val()); applyFilters(); });
    

    $('#resetFilters').on('click', function() {
        // 重置滑块数值
        $('#sliderOpacity').val(100).trigger('input');
        $('#sliderSaturation').val(100).trigger('input');
        $('#sliderBrightness').val(100).trigger('input');
        $('#sliderHue').val(0).trigger('input');
        $('#sliderGray').val(0).trigger('input');
        $('#sliderBlur').val(0).trigger('input');
        
  
        $('#imgManipulated img').css({
            'filter': 'none',
            '-webkit-filter': 'none'
        });
    });
});
</script>

</body>   
</html>
